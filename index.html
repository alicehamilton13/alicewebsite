<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Clone</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      overflow-x:hidden;

      /* 🌈 Pastel swirl background (NO WHITE) */
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 182, 193, 0.95), transparent 45%), /* pink */
        radial-gradient(circle at 80% 20%, rgba(255, 200, 150, 0.95), transparent 45%), /* orange */
        radial-gradient(circle at 30% 70%, rgba(186, 140, 255, 0.85), transparent 50%), /* purple */
        radial-gradient(circle at 70% 80%, rgba(255, 230, 140, 0.95), transparent 45%), /* yellow */
        radial-gradient(circle at 50% 50%, rgba(255, 170, 210, 0.9), transparent 55%);

      background-color:#ffd6ec;
      animation: swirl 12s ease-in-out infinite;
      background-size:200% 200%;
    }

    @keyframes swirl{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    /* TOP BAR */
    .top-bar{
      display:flex;
      justify-content:space-between;
      padding:10px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.2);
    }

    /* STORIES */
    .stories{
      display:flex;
      overflow-x:auto;
      padding:10px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.15);
    }

    .story img{
      width:60px;
      height:60px;
      border-radius:50%;
      border:2px solid rgba(255, 180, 120, 0.8);
    }

    /* FEED */
    .feed{
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    /* POST (NO WHITE) */
    .post{
      width:90%;
      max-width:400px;
      margin:15px 0;
      border-radius:15px;
      overflow:hidden;

      background: linear-gradient(135deg,
        rgba(255, 182, 193, 0.25),
        rgba(255, 200, 150, 0.25),
        rgba(186, 140, 255, 0.20),
        rgba(255, 230, 140, 0.25)
      );

      backdrop-filter: blur(12px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .post-header{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px;
      font-weight:bold;
    }

    .post-header img{
      width:35px;
      height:35px;
      border-radius:50%;
    }

    .image-container{
      position:relative;
    }

    .post img{
      width:100%;
      height:auto;
      display:block;
    }

    /* HEART */
    .top-like{
      position:absolute;
      top:10px;
      right:10px;
      font-size:22px;
      cursor:pointer;
      color:black;
      transition:0.2s;
    }

    .top-like.liked{
      color:red;
      transform:scale(1.2);
    }

    /* ACTIONS */
    .actions{
      display:flex;
      gap:15px;
      padding:10px;
      font-size:20px;
    }

    .actions span{
      cursor:pointer;
    }

    .actions .liked{
      color:red;
    }

    .likes{
      padding:0 10px 10px;
      font-weight:bold;
    }

    /* NAV (NO WHITE) */
    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      justify-content:space-around;
      padding:10px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
  <h2>MyGram</h2>
  <div>
    <span>➕</span>
    <span>✉️</span>
  </div>
</div>

<!-- STORIES -->
<div class="stories">
  <div class="story">
    <img src="https://i.pravatar.cc/60?img=1">
  </div>
  <div class="story"><img src="https://i.pravatar.cc/60?img=2"></div>
  <div class="story"><img src="https://i.pravatar.cc/60?img=3"></div>
</div>

<!-- FEED -->
<div class="feed">

  <div class="post">
    <div class="post-header">
      <img src="https://i.pravatar.cc/40?img=5">
      <span>cool_user</span>
    </div>
    <div class="image-container">
      <img src="https://picsum.photos/600/600?1">
      <span class="top-like" onclick="like(this)">❤</span>
    </div>
    <div class="actions">
      <span onclick="like(this)">❤</span>
      <span>💬</span>
      <span>✈️</span>
    </div>
    <p class="likes">0 likes</p>
  </div>

  <div class="post">
    <div class="post-header">
      <img src="https://i.pravatar.cc/40?img=6">
      <span>alex</span>
    </div>
    <div class="image-container">
      <img src="https://picsum.photos/600/600?2">
      <span class="top-like" onclick="like(this)">❤</span>
    </div>
    <div class="actions">
      <span onclick="like(this)">❤</span>
      <span>💬</span>
      <span>✈️</span>
    </div>
    <p class="likes">0 likes</p>
  </div>

  <div class="post">
    <div class="post-header">
      <img src="https://i.pravatar.cc/40?img=7">
      <span>jordan</span>
    </div>
    <div class="image-container">
      <img src="https://picsum.photos/600/600?3">
      <span class="top-like" onclick="like(this)">❤</span>
    </div>
    <div class="actions">
      <span onclick="like(this)">❤</span>
      <span>💬</span>
      <span>✈️</span>
    </div>
    <p class="likes">0 likes</p>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="nav">
  <span>🏠</span>
  <span>🔍</span>
  <span>➕</span>
  <span>❤</span>
  <span>👤</span>
</div>

<script>
function like(el){
  const post = el.closest(".post");
  const likes = post.querySelector(".likes");
  let num = parseInt(likes.textContent);

  const hearts = post.querySelectorAll(".top-like, .actions span:first-child");

  if(el.classList.contains("liked")){
    hearts.forEach(h => h.classList.remove("liked"));
    likes.textContent = (num - 1) + " likes";
  } else {
    hearts.forEach(h => h.classList.add("liked"));
    likes.textContent = (num + 1) + " likes";
  }
}
</script>

</body>
</html>
