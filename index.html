<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Social App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg, #ffd1dc, #ffe0b2, #fff3b0);
}

/* TOP BAR */
.top-bar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:white;
}

/* STORIES */
.stories{
  display:flex;
  overflow-x:auto;
  padding:10px;
  background:white;
}

.story img{
  width:60px;
  height:60px;
  border-radius:50%;
  margin-right:10px;
}

/* FEED */
.feed{
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* POST */
.post{
  width:90%;
  max-width:400px;
  background:white;
  margin:15px 0;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* HEADER */
.post-header{
  display:flex;
  align-items:center;
  padding:10px;
  gap:10px;
}

.post-header img{
  width:35px;
  height:35px;
  border-radius:50%;
}

/* IMAGE */
.image-container{
  position:relative;
}

.post img.main{
  width:100%;
  height:250px;
  object-fit:contain; /* NO zoom */
  background:#fff;
}

/* HEART ON IMAGE */
.top-like{
  position:absolute;
  top:10px;
  right:10px;
  font-size:22px;
  cursor:pointer;
  color:black;
}

.top-like.liked{
  color:red;
}

/* ACTIONS */
.actions{
  display:flex;
  gap:15px;
  padding:10px;
  font-size:20px;
}

.actions span{
  cursor:pointer;
}

.actions .liked{
  color:red;
}

/* LIKES TEXT */
.likes{
  padding:0 10px 10px;
  font-weight:bold;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:white;
}
</style>
</head>

<body>

<!-- STORIES -->
<div class="stories">
  <div class="story"><img src="https://i.pravatar.cc/60?img=1"></div>
  <div class="story"><img src="https://i.pravatar.cc/60?img=2"></div>
  <div class="story"><img src="https://i.pravatar.cc/60?img=3"></div>
</div>

<!-- FEED -->
<div class="feed">

  <!-- POST 1 -->
  <div class="post">
    <div class="post-header">
      <img src="https://i.pravatar.cc/40?img=5">
      <b>user1</b>
    </div>

    <div class="image-container">
      <img class="main" src="https://picsum.photos/600/400?1">

      <div class="top-like" onclick="like(this)">❤</div>
    </div>

    <div class="actions">
      <span onclick="like(this)">❤</span>
      <span>💬</span>
      <span>🔗</span>
    </div>

    <div class="likes">0 likes</div>
  </div>

  <!-- POST 2 -->
  <div class="post">
    <div class="post-header">
      <img src="https://i.pravatar.cc/40?img=6">
      <b>user2</b>
    </div>

    <div class="image-container">
      <img class="main" src="https://picsum.photos/600/400?2">

      <div class="top-like" onclick="like(this)">❤</div>
    </div>

    <div class="actions">
      <span onclick="like(this)">❤</span>
      <span>💬</span>
      <span>🔗</span>
    </div>

    <div class="likes">0 likes</div>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <span>🏠</span>
  <span>🔍</span>
  <span>➕</span>
  <span>❤</span>
</div>

<script>
function like(el){
  const post = el.closest(".post");
  const likes = post.querySelector(".likes");

  let num = parseInt(likes.textContent);

  const hearts = post.querySelectorAll(".top-like, .actions span:first-child");

  if(el.classList.contains("liked")){
    hearts.forEach(h => h.classList.remove("liked"));
    likes.textContent = (num - 1) + " likes";
  } else {
    hearts.forEach(h => h.classList.add("liked"));
    likes.textContent = (num + 1) + " likes";
  }
}
</script>

</body>
</html>
