<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Feed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Stories -->
  <div class="stories">
    <div class="story your-story">
      <div class="circle plus">+</div>
      <p>Your Story</p>
    </div>
    <div class="story"><img src="https://i.pravatar.cc/60?img=1" class="circle-img"></div>
    <div class="story"><img src="https://i.pravatar.cc/60?img=2" class="circle-img"></div>
    <div class="story"><img src="https://i.pravatar.cc/60?img=3" class="circle-img"></div>
    <div class="story"><img src="https://i.pravatar.cc/60?img=4" class="circle-img"></div>
  </div>

  <!-- Feed -->
  <div class="feed">

    <div class="post">
      <div class="post-header">
        <img src="https://i.pravatar.cc/40?img=5">
        <span class="username">cool_user</span>
        <button class="like-btn" onclick="like(this)">❤ <span>0</span></button>
      </div>
      <img src="https://picsum.photos/500/600?1">
      <div class="actions">
        <button onclick="comment()">💬</button>
        <button>🔗</button>
      </div>
    </div>

    <div class="post">
      <div class="post-header">
        <img src="https://i.pravatar.cc/40?img=6">
        <span class="username">alex</span>
        <button class="like-btn" onclick="like(this)">❤ <span>0</span></button>
      </div>
      <img src="https://picsum.photos/500/600?2">
      <div class="actions">
        <button onclick="comment()">💬</button>
        <button>🔗</button>
      </div>
    </div>

    <div class="post">
      <div class="post-header">
        <img src="https://i.pravatar.cc/40?img=7">
        <span class="username">jordan</span>
        <button class="like-btn" onclick="like(this)">❤ <span>0</span></button>
      </div>
      <img src="https://picsum.photos/500/600?3">
      <div class="actions">
        <button onclick="comment()">💬</button>
        <button>🔗</button>
      </div>
    </div>

  </div>

  <!-- Nav -->
  <div class="nav">
    <a href="#">🏠</a>
    <a href="search.html">🔍</a>
    <a href="play.html">▶</a>
    <a href="#">🛍</a>
    <a href="#">❤</a>
    <a href="#">👤</a>
  </div>

<script>
function like(btn){
  let count = btn.querySelector("span");
  count.textContent = parseInt(count.textContent) + 1;
  btn.classList.toggle("liked");
}

function comment(){
  alert("Comments coming soon!");
}
</script>

</body>
</html>
